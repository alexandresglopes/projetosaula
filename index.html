<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Exercícios</title>
    <style>
        body {
            display: flex;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        #menu {
            width: 250px;
            background-color: #333;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: 0.3s;
            position: relative;
            z-index: 10;
        }

        #menu.retraido {
            margin-left: -290px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            background-color: #444;
            border-radius: 4px;
            text-align: center;
            display: block;
            margin-bottom: 8px;
        }

        nav a:hover {
            background-color: #555;
        }

        #btn-toggle {
            position: fixed;
            left: 10px;
            top: 10px;
            z-index: 20;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        main {
            flex-grow: 1;
            position: relative;
            background-color: #f4f4f4;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        #welcome {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
            width: 100%;
            z-index: 5;
        }

        @media (max-width: 768px) {
            #menu {
                position: absolute;
                height: 100%;
            }
            #menu.retraido {
                margin-left: -290px;
            }
            #menu.aberto {
                margin-left: 0;
            }
        }
    </style>
</head>
<body ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)">

    <button id="btn-toggle" onclick="toggleMenu()">☰</button>

    <div id="menu">
        <h2 style="margin-top: 40px;">Menu</h2>
        <nav>
            <a href="lib/calculovendas.html" target="conteudo" onclick="navegar()">Cálculo de Vendas</a>
            <a href="lib/calculoimc.html" target="conteudo" onclick="navegar()">Cálculo de IMC</a>
            <a href="lib/mediaaluno.html" target="conteudo" onclick="navegar()">Média Aluno</a>
            <a href="lib/maioridade.html" target="conteudo" onclick="navegar()">Maioridade</a>
            <a href="lib/notaaluno.html" target="conteudo" onclick="navegar()">Nota Aluno</a>
            <a href="lib/salarioprofessor.html" target="conteudo" onclick="navegar()">Salário Professor</a>
            <a href="lib/troco.html" target="conteudo" onclick="navegar()">Caixa Registradora</a>
            <a href="lib/turnoentrega.html" target="conteudo" onclick="navegar()">Turno Entrega</a>            
        </nav>
    </div>

    <main id="main-content">
        <div id="welcome">
            <h1>Bem-vindo aos Projetos</h1>
            <p>Selecione um item no menu lateral para começar.</p>
        </div>
        <iframe name="conteudo" id="frame"></iframe>
    </main>

    <script>
        const menu = document.getElementById('menu');
        const welcome = document.getElementById('welcome');
        let xDown = null;

        if (window.innerWidth <= 768) {
            menu.classList.add('retraido');
        }

        function toggleMenu() {
            if (window.innerWidth <= 768) {
                menu.classList.toggle('aberto');
                menu.classList.remove('retraido');
                if (!menu.classList.contains('aberto')) {
                    menu.classList.add('retraido');
                }
            } else {
                menu.classList.toggle('retraido');
            }
        }

        function navegar() {
            welcome.style.display = 'none';
            if (window.innerWidth <= 768) {
                menu.classList.remove('aberto');
                menu.classList.add('retraido');
            }
        }

        function handleTouchStart(evt) {
            xDown = evt.touches[0].clientX;
        }

        function handleTouchMove(evt) {
            if (!xDown) return;
            let xUp = evt.touches[0].clientX;
            let xDiff = xDown - xUp;

            if (xDiff < -50) { 
                if (window.innerWidth <= 768) {
                    menu.classList.add('aberto');
                    menu.classList.remove('retraido');
                } else {
                    menu.classList.remove('retraido');
                }
            } else if (xDiff > 50) {
                if (window.innerWidth <= 768) {
                    menu.classList.remove('aberto');
                    menu.classList.add('retraido');
                } else {
                    menu.classList.add('retraido');
                }
            }
            xDown = null;
        }
    </script>
</body>
</html>
