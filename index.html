<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/logo.png">
    <title>Sistema de Exercícios</title>
    <style>
        body {
            display: flex;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        #menu {
            width: 250px;
            background-color: #333;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: 0.3s;
            position: fixed;
            height: 100%;
            z-index: 30;
            left: 0;
        }

        #menu.retraido {
            left: -290px;
        }

        #btn-fechar {
            background: #444;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            align-self: flex-end;
            margin-bottom: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px;
            background-color: #444;
            border-radius: 4px;
            text-align: center;
            display: block;
            margin-bottom: 8px;
        }

        nav a:hover {
            background-color: #555;
        }

        #btn-toggle {
            position: fixed;
            left: 10px;
            top: 10px;
            z-index: 20;
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        main {
            flex-grow: 1;
            position: relative;
            background-color: #f4f4f4;
            margin-left: 0;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        #welcome {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
            width: 100%;
            z-index: 5;
        }
        .img{
            width: 200px;
            border-radius: 30px;
        }
        .imgmenu{
            align-self: flex-start;
            width: 60px;
            border-radius: 5px;
        }
    </style>
</head>
<body ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)">

    <button id="btn-toggle" onclick="abrirMenu()">☰ Abrir Menu</button>

    <div id="menu" class="retraido">
        <img src="img/logo.png" class="imgmenu">
        <button id="btn-fechar" onclick="fecharMenu()">✖ Fechar</button>
        <h2 style="margin: 0;">Menu</h2>
        <nav>
            <a href="lib/calculovendas.html" target="conteudo" onclick="navegar()">Cálculo de Vendas</a>
            <a href="lib/caixavendas.html" target="conteudo" onclick="navegar()">Caixa de Vendas</a>
            <a href="lib/calculoimc.html" target="conteudo" onclick="navegar()">Cálculo de IMC</a>
            <a href="lib/acesso.html" target="conteudo" onclick="navegar()">Controle de Acesso</a>
            <a href="lib/troco.html" target="conteudo" onclick="navegar()">Caixa Registradora</a>
            <a href="lib/frete.html" target="conteudo" onclick="navegar()">Controle de Fretes</a>
            <a href="lib/mediaaluno.html" target="conteudo" onclick="navegar()">Média Aluno</a>
            <a href="lib/maioridade.html" target="conteudo" onclick="navegar()">Maioridade</a>
            <a href="lib/notaaluno.html" target="conteudo" onclick="navegar()">Nota Aluno</a>
            <a href="lib/salarioprofessor.html" target="conteudo" onclick="navegar()">Salário Professor</a>            
            <a href="lib/turnoentrega.html" target="conteudo" onclick="navegar()">Turno Entrega</a>            
        </nav>
    </div>

    <main id="main-content" onclick="fecharMenu()">
        <div id="welcome">
            <h1>Bem-vindo aos Projetos</h1>
            <p>Selecione um item no menu lateral para começar.</p>
            <img src="img/logo.png" class="img">
        </div>
        <iframe name="conteudo" id="frame"></iframe>
    </main>

    <script>
        const menu = document.getElementById('menu');
        const welcome = document.getElementById('welcome');
        let xDown = null;

        function abrirMenu() {
            menu.classList.remove('retraido');
        }

        function fecharMenu() {
            menu.classList.add('retraido');
        }

        function navegar() {
            welcome.style.display = 'none';
            fecharMenu();
        }

        function handleTouchStart(evt) {
            xDown = evt.touches[0].clientX;
        }

        function handleTouchMove(evt) {
            if (!xDown) return;
            let xUp = evt.touches[0].clientX;
            let xDiff = xDown - xUp;

            if (xDiff < -50) { 
                abrirMenu();
            } else if (xDiff > 50) {
                fecharMenu();
            }
            xDown = null;
        }
    </script>
</body>
</html>
