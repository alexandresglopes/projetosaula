<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(255, 255, 255);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .principal {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            background-color: white;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            transition: 0.5s;
        }
        .principal:hover{
            transform: translateY(-3px);
        }

        img {
            width: 150px;
            height: 150px;                      
            margin: 30px auto;
            display: block;
        }        

        h2 {
            font-size: 25px;
            color: rgb(62, 124, 194);
            margin: 20px;
        }        

        p {
            color: #6376a0;
            margin-bottom: 30px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 18px;
            color: #6376a0;
            margin-bottom: 5px;
            margin-left: 10px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 25px;
            border: none;
            background-color: #f0f1f2;
            font-size: 1em;
            color: #fffefe;
        }

        input[type="button"] {
            width: 100%;
            padding: 15px;
            background-color: #0068a2;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
        }

        input[type="button"]:hover {
            background: #ce8b3a;
            ;
            cursor: pointer;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="principal">
        <img src="img/imagem.png" alt="imagem">
        <h2>Efetuar Login</h2>
        <p>Faça seu login aqui...</p>
        <form>
            <label>Usuário:</label>
            <input type="text" id="login" name="login" placeholder=".....">
            <label>Senha:</label>
            <input type="text" id="senha" name="senha" placeholder="******">
            <input type="button" value=" LOGAR " id="senha">
        </form>
    </div>

</body>

</html>
