<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Moderno</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bootstrap/bootstrap.css">
    <link rel="stylesheet" href="../css/cadastrousuario.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">

</head>

<body>

    <div class="principal">
        <img src="../img/cadastro.jpg" style="border-radius: 5px;" alt="">

        <h2>Cadastro</h2>
        <p>Preencha o formulário para se cadastrar:</p>

        <form onsubmit="event.preventDefault(); cadastro();">
            <div class="form-group">
                <div class="row">
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Nome</label>
                            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Sobrenome</label>
                            <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome"
                                required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Sexo</label>
                            <select class="select" name="sexo" id="sexo" required>
                                <option value="">---selecione---</option>
                                <option value="1">Homem</option>
                                <option value="2">Mulher</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>E-mail</label>
                            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Senha</label>
                            <input type="password" id="txtSenha" name="senha" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Confirmar Senha</label>
                            <input type="password" id="txtConfirmarSenha" oninput="validaSenha(this)"
                                name="confirmsenha" placeholder="••••••••" required>
                            <center><span class="confirmsenha" id="confirmsenha">Senhas não conferem!</span></center>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn-logar">Cadastrar</button>
                    </div>
                </div>
            </div>
        </form>

        <div class="footer-links">
            <span>Já tenho cadastro? <a href="login.html">Voltar</a></span>
        </div>
    </div>

    <script>
        function validaSenha(input) {
            let senha = document.getElementById('txtSenha').value;
            let confirma = input.value;

            if (confirma !== senha) {
                document.getElementById('confirmsenha').style.display = 'block';
                input.setCustomValidity('As senhas não coincidem!');
            } else {
                document.getElementById('confirmsenha').style.display = 'none';
                input.setCustomValidity('');
            }
        }

        function cadastro() {
            let nome = document.getElementById('nome').value;
            let sobrenome = document.getElementById('sobrenome').value;
            let sexo = document.getElementById('sexo').value;
            let email = document.getElementById('email').value;
            let senha = document.getElementById('txtSenha').value;
            let confirma = document.getElementById('txtConfirmarSenha').value;


            if (senha === confirma) {
                alert('Cadastro realizado com sucesso!');
                window.location.href = "login.html";
            } else {
                alert('As senhas não coincidem!');
            }
        }
    </script>

</body>

</html>
