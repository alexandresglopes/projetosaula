<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliança Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

    <div class="principal">

        <img src="../img/logo.png" style="border-radius: 5px;" alt="">

        <!-- <h2>Bem-vindo</h2>
        <p>Acesse sua conta para continuar</p> -->

        <form>
            <div class="campo-input">
                <label>Usuário</label>
                <input type="text" id="login" name="login" value="aluno@senai.com" placeholder="Digite seu usuário">

            <div class="campo-input">
                <label>Senha</label>
                <input type="password" id="senha" name="senha" value="123456789" placeholder="••••••••">

            <button type="button" class="btn-logar" onclick="navegar()">Acessar Sistema</button>
        </form>

        <div class="footer-links">
            <span>Ainda não tem conta? <a href="cadastrousuario.html">Cadastre-se</a></span>

            <div style="justify-items: center;margin-top: 30px;">
                <a href="../index.html">Voltar</a>
            </div>

        </div>
    </div>

    <script>
        function navegar() {
            window.location.href = "home.html";
        }
    </script>

</body>

</html>
