<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionário</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../bootstrap/bootstrap.css">
    <script src="../../../js/script.js"></script>
    <link rel="stylesheet" href="../css/funcionario.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
</head>

<body>

    <div class="top">
        <a href="home.html" style="text-decoration: none; font-size: 24px;">⬅️</a>
    </div>

    <div class="principal">

        <img src="../img/funcionarios.jpeg" alt="" class="icone-cadastro">

        <h2>Cadastro de Funcionário:</h2>
        <p>Preencha os dados abaixo para salvar o funcionário:</p>

        <!-- <form onsubmit="event.preventDefault(); salvarFuncionario();"> -->
        <form>
            <div class="form-group">
                <div class="row">

                    <div class="col-12">
                        <div class="preview-container">
                            <div class="image-preview" id="imagePreview">
                                <img src="" alt="Preview da Imagem" id="previewImage">
                                <div class="preview-placeholder" id="previewPlaceholder">
                                    Sua imagem<br>aparecerá aqui
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="campo-input">
                            <label>Imagem do Produto</label>
                            <input type="file" id="imagemProduto" accept="image/*" onchange="exibirPreview(this)"
                                required>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="campo-input">
                            <label>Nome</label>
                            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Sobrenome</label>
                            <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome"
                                required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>CPF</label>
                            <input type="text" id="cpf" name="cpf" maxlength="14" oninput="mascaraCPF(this)"
                                placeholder="000.000.000-00">
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>RG</label>
                            <input type="text" id="rg" name="rg" placeholder="00000000" required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Sexo</label>
                            <select class="select" name="sexo" id="sexo" required>
                                <option value="">---selecione---</option>
                                <option value="1">Homem</option>
                                <option value="2">Mulher</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Salário (R$)</label>
                            <input type="text" id="salario" name="salario" step="0.01" placeholder="0,00"
                                oninput="mascaraMoeda(this);" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Cargo</label>
                            <input type="text" id="cargo" name="cargo" placeholder="Digite seu cargo" required>
                        </div>
                    </div>


                    <div class="col-4">
                        <input type="submit" class="btn-salvar" name="insert" value="CADASTRAR"
                            onclick="salvarFuncionario()">
                    </div>
                    <div class="col-4">
                        <input type="submit" class="btn-salvar" name="update" value="EDITAR"
                            onclick="editaruncionario()">
                    </div>
                    <div class="col-4">
                        <input type="submit" class="btn-salvar" name="excluir" value="EXCLUIR"
                            onclick="deleteFuncionario()">
                    </div>
                </div>
            </div>
        </form>

    </div>


    <script>

        function exibirPreview(input) {
            const preview = document.getElementById('previewImage');
            const placeholder = document.getElementById('previewPlaceholder');

            if (input.files && input.files[0]) {
                const leitor = new FileReader();
                leitor.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                leitor.readAsDataURL(input.files[0]);
            } else {
                preview.src = "";
                preview.style.display = 'none';
                placeholder.style.display = 'block';
            }
        }

        function salvarFuncionario() {

            const nome = document.getElementById('nome').value;
            const sobrenome = document.getElementById('sobrenome').value;
            const cpf = document.getElementById('cpf').value;
            const rg = document.getElementById('rg').value;
            const sexo = document.getElementById('sexo').value;
            const salario = document.getElementById('salario').value;
            const cargo = document.getElementById('cargo').value;
            let s = '';

            if (sexo == 1) { s = 'Homem' } else { s = 'Mulher' }

            alert(`Sucesso!\nO Funcionário ${nome} ${sobrenome},\n CPF: ${cpf},\n RG: ${rg},\n Sexo: ${s},\n Salário: ${salario},\n Cargo: ${cargo}\n foi salvo com sucesso!`);

            document.querySelector('form').reset();
            document.getElementById('valorTotal').value = "0,00";
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewPlaceholder').style.display = 'block';
        }

        function editaruncionario() {
            
            alert('Editado com sucesso!');

            document.querySelector('form').reset();
            document.getElementById('valorTotal').value = "0,00";
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewPlaceholder').style.display = 'block';
        }

        function deleteFuncionario() {

            alert('Excluido com sucesso!');

            document.querySelector('form').reset();
            document.getElementById('valorTotal').value = "0,00";
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewPlaceholder').style.display = 'block';
        }
    </script>



</body>

</html>
