<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliança Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/servicos.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
</head>

<body>

    <div class="top">
        <a href="home.html">⬅️</a>
        <label class="label">Financeiro</label>
        <div style="width: 24px;"></div>
    </div>

    <div class="principal" style="background: transparent; box-shadow: none; padding: 0;">
        <div class="services-grid" id="grid-servicos">
        </div>
    </div>

    <script>
        const servicos = [
            {
                titulo: "Fluxo de Caixa",
                descricao: "R$ 150.000,00",
                icone: "$"
            },
            {
                titulo: "Planejamento Orçamentário",
                descricao: "R$ 30.000,00",
                icone: "$"
            },
            {
                titulo: "Gestão de Custos",
                descricao: "R$ 10.000,00",
                icone: "$"
            },
            
        ];

        function carregarServicos() {
            const grid = document.getElementById("grid-servicos");
            grid.innerHTML = "";

            servicos.forEach(servico => {
                const card = `
                    <div class="service-card">
                        <div class="service-icon">${servico.icone}</div>
                        <h3>${servico.titulo}</h3>
                        <p>${servico.descricao}</p>
                        <a href="#" class="btn-contratar">Acessar</a>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        window.onload = carregarServicos;
    </script>
</body>

</html>
