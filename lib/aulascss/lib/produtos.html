<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aliança Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../bootstrap/bootstrap.css">
    <link rel="stylesheet" href="../css/produtos.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
</head>

<body>

    <div class="top">
        <a href="home.html" style="text-decoration: none; font-size: 24px;">⬅️</a>

        <label class="label" style="margin: 0;">Lista de Produtos</label>

        <a href="cadastroproduto.html" style="text-decoration: none; font-size: 24px;">➕</a>
    </div>

    <div class="principal">

        <div class="divtable">
            <table class="table">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Qtd.</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>

                </tbody>

            </table>
        </div>

    </div>


    <script>

        const clientes = [
            { produto: "Placa de Vídeo", marca: "Nvidia", modelo: "Ge Force", qtd: "20" },
            { produto: "Memória RAM", marca: "Multilaser", modelo: "Dimm Ddr3", qtd: "15" },
            { produto: "Placa de Mãe", marca: "ASUS", modelo: "TUF Gaming", qtd: "10" },
        ];

        function popularTabela() {
            const corpoTabela = document.querySelector(".table tbody");


            corpoTabela.innerHTML = "";


            clientes.forEach((cliente) => {
                const linha = `
                <tr>
                    <td>${cliente.produto}</td>
                    <td>${cliente.marca}</td>
                    <td>${cliente.modelo}</td>
                    <td>${cliente.qtd}</td>
                    <td><button class="btn-edit" onclick="editarCliente('${cliente.produto}')">✏️</button></td>
                </tr>
            `;
                corpoTabela.innerHTML += linha;
            });
        }


        function editarCliente(prod) {
            alert("Editar cliente com CPF: " + prod);
        }


        window.onload = popularTabela;
    </script>





</body>

</html>
