<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Moderno</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bootstrap/bootstrap.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .principal {
            width: 100%;
            max-width: 650px;
            padding: 40px 30px;
            text-align: center;
            background-color: white;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 25px;
            transition: all 0.4s ease;
        }

        .principal:hover {
            transform: translateY(-10px);
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.3);
        }

        img {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            display: block;
            filter: drop-shadow(0px 5px 5px rgba(0, 0, 0, 0.1));
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            color: #4a4a4a;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .campo-input {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            margin-left: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid #f0f1f2;
            background-color: #f8f9fa;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            color: #333;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #667eea;
            background-color: #fff;
            box-shadow: 0px 0px 10px rgba(102, 126, 234, 0.2);
        }

        .select {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid #f0f1f2;
            background-color: #f8f9fa;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            color: #333;
        }

        .select:focus {
            border-color: #667eea;
            background-color: #fff;
            box-shadow: 0px 0px 10px rgba(102, 126, 234, 0.2);
        }

        .btn-logar {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0px 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-logar:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
            box-shadow: 0px 8px 20px rgba(102, 126, 234, 0.6);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 13px;
        }

        .footer-links a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .confirmsenha {
            display: none;
            color: red;
            font-size: 12px;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="principal">
        <img src="img/cadastro.png" alt="">

        <h2>Cadastro</h2>
        <p>Preencha o formulário para se cadastrar:</p>

        <form onsubmit="event.preventDefault(); cadastro();">
            <div class="form-group">
                <div class="row">
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Nome</label>
                            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Sobrenome</label>
                            <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite seu sobrenome" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Sexo</label>
                            <select class="select" name="sexo" id="sexo" required>
                                <option value="">---selecione---</option>
                                <option value="1">Homem</option>
                                <option value="2">Mulher</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>E-mail</label>
                            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Senha</label>
                            <input type="password" id="txtSenha" name="senha" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="campo-input">
                            <label>Confirmar Senha</label>
                            <input type="password" id="txtConfirmarSenha" oninput="validaSenha(this)"
                                name="confirmsenha" placeholder="••••••••" required>
                            <center><span class="confirmsenha" id="confirmsenha">Senhas não conferem!</span></center>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn-logar">Cadastrar</button>
                    </div>
                </div>
            </div>
        </form>

        <div class="footer-links">
            <span>Já tenho cadastro? <a href="loginmoderno.html">Voltar</a></span>
        </div>
    </div>

    <script>
        function validaSenha(input) {
            let senha = document.getElementById('txtSenha').value;
            let confirma = input.value;
            
            if (confirma !== senha) {
                document.getElementById('confirmsenha').style.display = 'block';
                input.setCustomValidity('As senhas não coincidem!');
            } else {
                document.getElementById('confirmsenha').style.display = 'none';
                input.setCustomValidity('');
            }
        }

        function cadastro() {
            let nome = document.getElementById('nome').value;
            let sobrenome = document.getElementById('sobrenome').value;
            let sexo = document.getElementById('sexo').value;
            let email = document.getElementById('email').value;
            let senha = document.getElementById('txtSenha').value;
            let confirma = document.getElementById('txtConfirmarSenha').value;

            
            if (senha === confirma) {
                alert('Cadastro realizado com sucesso!');
                window.location.href = "loginmoderno.html";
            } else {
                alert('As senhas não coincidem!');
            }
        }
    </script>

</body>

</html>
