<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bootstrap/bootstrap.css">
    <script src="../../js/script.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
            color: #333;
            padding: 20px;
        }

        .principal {
            width: 100%;
            max-width: 650px;
            padding: 40px 30px;
            text-align: center;
            background-color: white;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.2);
            border-radius: 25px;
            transition: all 0.4s ease;
        }

        .principal:hover {
            transform: translateY(-10px);
            box-shadow: 0px 20px 40px rgba(0, 0, 0, 0.3);
        }

        .icone-cadastro {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
            filter: drop-shadow(0px 5px 5px rgba(0, 0, 0, 0.1));
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            color: #4a4a4a;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .campo-input {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            margin-left: 15px;
        }

        
        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid #f0f1f2;
            background-color: #f8f9fa;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            color: #333;
        }

        
        input[type="file"] {
            padding: 12px 20px;
            cursor: pointer;
        }

        input:focus {
            border-color: #667eea;
            background-color: #fff;
            box-shadow: 0px 0px 10px rgba(102, 126, 234, 0.2);
        }

        input:disabled {
            background-color: #e9ecef;
            cursor: not-allowed;
            color: #4a4a4a;
            font-weight: bold;
        }

        
        .preview-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .image-preview {
            width: 150px;
            height: 150px;
            border: 3px solid #f0f1f2;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            background-color: #f8f9fa;
        }

        #previewImage {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: none; 
        }

        .preview-placeholder {
            color: #b2bec3;
            font-size: 12px;
            text-align: center;
            padding: 10px;
        }

        .btn-salvar {
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0px 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-salvar:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
            box-shadow: 0px 8px 20px rgba(102, 126, 234, 0.6);
        }

        .footer-links {
            margin-top: 25px;
            font-size: 13px;
        }

        .footer-links a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="principal">
        <img src="img/produto.png" alt="" class="icone-cadastro">

        <h2>Novo Produto</h2>
        <p>Preencha os dados abaixo para salvar no estoque:</p>

        <form onsubmit="event.preventDefault(); salvarProduto();">
            <div class="form-group">
                <div class="row">
                    
                    <div class="col-12">
                        <div class="preview-container">
                            <div class="image-preview" id="imagePreview">
                                <img src="" alt="Preview da Imagem" id="previewImage">
                                <div class="preview-placeholder" id="previewPlaceholder">
                                    Sua imagem<br>aparecerá aqui
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="campo-input">
                            <label>Imagem do Produto</label>
                            <input type="file" id="imagemProduto" accept="image/*" onchange="exibirPreview(this)" required>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="campo-input">
                            <label>Produto</label>
                            <input type="text" id="produto" placeholder="Ex: Feijão" required>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="campo-input">
                            <label>Marca</label>
                            <input type="text" id="marca" placeholder="Ex: Tropeiro" required>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="campo-input">
                            <label>Quantidade</label>
                            <input type="number" id="quantidade" placeholder="0" min="1" oninput="calcularTotal()" required>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="campo-input">
                            <label>Valor Unitário (R$)</label>
                            <input type="text" id="valorUnitario" step="0.01" placeholder="0,00" oninput="calcularTotal(); mascaraMoeda(this);" required>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="campo-input">
                            <label>Valor Total (R$)</label>
                            <input type="text" id="valorTotal" value="0,00" disabled>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit" class="btn-salvar">Salvar Produto</button>
                    </div>
                </div>
            </div>
        </form>

        <div class="footer-links">
            <a href="loginmoderno.html">Voltar para o Painel</a>
        </div> 
    </div>

    <script>
        
        function calcularTotal() {
            let qtd = document.getElementById('quantidade').value;
            qtd = Number(qtd.replace(/\./g, "").replace(",", "."));
            let valor = document.getElementById('valorUnitario').value;
            valor = Number(valor.replace(/\./g, "").replace(",", "."));
            let totalElemento = document.getElementById('valorTotal');

            if (qtd && valor) {
                let resultado = parseFloat(qtd) * parseFloat(valor);
                totalElemento.value = resultado.toFixed(2).replace('.', ',');
            } else {
                totalElemento.value = "0,00";
            }
        }

        
        function exibirPreview(input) {
            const preview = document.getElementById('previewImage');
            const placeholder = document.getElementById('previewPlaceholder');            
            
            if (input.files && input.files[0]) {
                const leitor = new FileReader();
                
                leitor.onload = function(e) {                    
                    preview.src = e.target.result;                    
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                
                leitor.readAsDataURL(input.files[0]);
            } else {                
                preview.src = "";
                preview.style.display = 'none';
                placeholder.style.display = 'block';
            }
        }

        
        function salvarProduto() {
            const produto = document.getElementById('produto').value;
            const marca = document.getElementById('marca').value;
            const total = document.getElementById('valorTotal').value;
            const imagemInput = document.getElementById('imagemProduto');
            
            alert(`Sucesso!\nO produto "${produto}" (${marca}) foi salvo.\nValor Total: R$ ${total}`);
            
            document.querySelector('form').reset();
            document.getElementById('valorTotal').value = "0,00";
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('previewPlaceholder').style.display = 'block';
        }
    </script>

</body>

</html>
