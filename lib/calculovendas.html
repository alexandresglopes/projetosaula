<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Vendas</title>
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <link rel="stylesheet" href="../css/estilo.css">
    <script src="../js/script.js"></script>
</head>

<body>
    <div class="divPrincipal">
        <div style="background-color: #4a69bd; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">Calculo de Vendas</h2>
        </div>
        <div style="padding: 30px;">
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">NOME
                    DO VENDEDOR</label>
                <input type="text" id="nome" placeholder="Digite o nome completo" class="inputnome">
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">SALÁRIO
                    FIXO:</label>
                <input type="text" id="fixo" oninput="mascaraMoeda(this)" placeholder="0.0" class="inputvalor">
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">VALOR
                    DA VENDA (R$):</label>
                <input type="text" id="vendas" oninput="mascaraMoeda(this)" placeholder="0.0" class="inputvalor">
            </div>

            <div style="text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="limpar()" class="botaolimpar">
                    LIMPAR
                </button>
                <button onclick="verificar()" class="botao">
                    VERIFICAR
                </button>
            </div>
        </div>
    </div>

    <div id="res"></div>



    <script>

        function limpar() {

            document.getElementById('nome').value = "";
            document.getElementById('fixo').value = "";
            document.getElementById('vendas').value = "";
            document.getElementById('res').innerHTML = '';

        }       

        function verificar() {
            console.log('Função chamada com sucesso');

            let nome = document.getElementById('nome').value;
            let valorCampo1 = document.getElementById('fixo').value;
            let valorCampo2 = document.getElementById('vendas').value;

            
            if (nome !== '' && valorCampo1 !== '' && valorCampo2 !== '') {
                nome = nome.toUpperCase();
                
                let salarioFixo = Number(valorCampo1.replace(/\./g, "").replace(",", "."));
                let totalVendas = Number(valorCampo2.replace(/\./g, "").replace(",", "."));

                let comissao = totalVendas * 0.10;
                let salarioFinal = salarioFixo + comissao;
                
                let totalVendasFormat = formatarReal(totalVendas);
                let salarioFixoFormat = formatarReal(salarioFixo);
                let salarioFinalFormat = formatarReal(salarioFinal);
                let comissaoFormat = formatarReal(comissao);

                document.getElementById('res').innerHTML = `
                    <div class="divresult">                    
                        <div style="margin-bottom: 10px;">
                            <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">Relatório:</span><br>
                            <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${nome}</span>
                        </div>

                        <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                            <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                <small style="display: block; color: #999;">Salário: R$</small> <strong>${salarioFixoFormat}</strong>
                            </div> 
                            
                            <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                <small style="display: block; color: #999;">Valor de vendas R$</small> <strong>${totalVendasFormat}</strong>
                            </div>

                            <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                <small style="display: block; color: #999;">Valor de comissão R$</small> <strong>${comissaoFormat}</strong>
                            </div>

                            <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                <small style="display: block; color: #999;">Salário final R$</small> <strong>${salarioFinalFormat}</strong>
                            </div>
                        </div>                                        
                    </div>
                `;
            } else {
                alert("PREENCHA TODOS OS DADOS!");
            }
        }


    </script>
</body>

</html>
