<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario de Entrega</title>
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <link rel="stylesheet" href="../css/estilo.css">
    <script src="../js/script.js"></script>
</head>

<body>
    <div class="divPrincipal">
        <div style="background-color: #4a69bd; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">Horário de Entrega</h2>
        </div>
        <div style="padding: 30px;">
            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">HORÁRIO
                    DE ENTREGA:</label>
                <select id="hora" class="select" required>
                    <option value="" disabled selected hidden>--selecione--</option>
                </select>
            </div>

            <div style="text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="limpar()" class="botaolimpar">
                    LIMPAR
                </button>
                <button onclick="verificar()" class="botao">
                    VERIFICAR
                </button>
            </div>
        </div>
    </div>

    <div id="res"></div>

    <script>


        window.onload = function () {
            const select = document.getElementById('hora');
            for (let i = 0; i <= 23; i++) {
                let opt = document.createElement('option');
                opt.value = i;
                opt.innerHTML = (i < 10 ? '0' + i : i) + ':00hs';
                select.appendChild(opt);
            }
        };

        function limpar() {
            document.getElementById('res').innerHTML = '';
            document.getElementById('hora').selectedIndex = 0;
        }

        function verificar() {
            let hora = Number(document.getElementById('hora').value);
            
            let status = '';

            if (hora < 0 || hora > 23) {
                status = 'Horário Inválido';
            } else if (hora >= 6 && hora <= 11) {
                status = 'Entrega pela manhã';
            } else if (hora >= 12 && hora <= 17) {
                status = 'Entrega pela tarde';
            } else if (hora >= 18 && hora <= 23) {
                status = 'Entrega pela noite';
            } else {
                status = 'Entrega na madrugada';
            }

            document.getElementById('res').innerHTML = `
                <div class="divresult">                    
                    <div style="margin-bottom: 10px;">
                        <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">Status:</span><br>
                        <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${status}</span>
                    </div>                                                                         
                </div>
            `;


        }

    </script>
</body>

</html>
