<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado Aluno</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <script src="../js/script.js"></script>
</head>

<body>
    <div class="divPrincipal">
        <div style="background-color: #4a69bd; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">Nota Aluno</h2>
        </div>
        <div style="padding: 30px;">
            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">NOME</label>
                <input type="text" id="nome" placeholder="Digite o nome completo" class="inputnome">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">NOTA
                    FINAL:</label>
                <input type="number" id="nota" placeholder="0.0" class="inputvalor">
            </div>

            <div style="text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="limpar()" class="botaolimpar">
                    LIMPAR
                </button>
                <button onclick="verificar()" class="botao">
                    VERIFICAR
                </button>
            </div>
        </div>
    </div>

    <div id="res"></div>    

    <script>


        function limpar() {

            document.getElementById('nome').value = "";
            document.getElementById('nota').value = "";
            document.getElementById('res').innerHTML = '';

        }        

        function verificar() {
            let nome = document.getElementById('nome').value;
            let nota = Number(document.getElementById('nota').value);
            let status = '';

            if (nome != '' && nota != '') {

                nome = nome.toUpperCase();
                console.log(nota)

                if (nota >= 7 && nota <= 10) {
                    status = 'Aprovado';
                } else if (nota >= 5 && nota < 7) {
                    status = 'Recuperação';
                } else if (nota >= 0 && nota < 5) {
                    status = 'Reprovado';
                } else {
                    status = 'Nota Inválida';
                }

                document.getElementById('res').innerHTML = `
                    <div class="divresult">                    
                        <div style="margin-bottom: 10px;">
                            <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">Relatório:</span><br>
                            <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${nome}</span>
                        </div>

                        <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                            <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                <small style="display: block; color: #999;">Nota final: </small> <strong>${nota}</strong>
                            </div> 
                            
                            <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                <small style="display: block; color: #999;">Resultado</small> <strong>${status}</strong>
                            </div>                        
                        </div>                                        
                    </div>
                `;

            }else {
                alert("PREENCHA OS DADOS!");
            }



        }


    </script>
</body>

</html>
