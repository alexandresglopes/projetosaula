        function registrar() {
            let nome1 = document.getElementById('nome1').value;

            let sexo1 =  Number(document.getElementById('sexo1').value);
            let idade1 = Number(document.getElementById('idade1').value);
            let end1 = document.getElementById('end1').value;

            let nome2 = document.getElementById('nome2').value;
            nome2 = nome2.toUpperCase();
            let sexo2 =  Number(document.getElementById('sexo2').value);
            let idade2 =  Number(document.getElementById('idade2').value);
            let end2 = document.getElementById('end2').value;

            let nome3 = document.getElementById('nome3').value;
            nome3 = nome3.toUpperCase();
            let sexo3 =  Number(document.getElementById('sexo3').value);
            let idade3 =  Number(document.getElementById('idade3').value);
            let end3 = document.getElementById('end3').value;

            let sexo4 =  Number(document.getElementById('sexo4').value);
            let idade4 =  Number(document.getElementById('idade4').value);

            let sexo5 =  Number(document.getElementById('sexo5').value);
            let idade5 =  Number(document.getElementById('idade5').value);

            if(sexo3==1){ qtdh = qtdh + 1; textsx3='Homem'; }else{ qtdm = qtdm + 1; textsx3='Mulher';}
            if(sexo4==1){ qtdh = qtdh + 1; textsx4='Homem'; }else{ qtdm = qtdm + 1; textsx4='Mulher';}
            if(sexo5==1){ qtdh = qtdh + 1; textsx5='Homem'; }else{ qtdm = qtdm + 1; textsx5='Mulher';}

            

            media = (idade1 + idade2 + idade3 + idade4 + idade5) / 5

            cor = 'green';

            if (nome1 != '' &&
                sexo1 != '' && 
                idade1 != '' &&
                end1 != '' &&
                nome2 != '' &&
                sexo2 != '' && 
                idade2 != '' &&
                end2 != '' &&
                nome3 != '' &&
                sexo3 != '' && 
                idade3 != '' &&
                end3 != '' &&
                nome4 != '' &&
                sexo4 != '' && 
                idade4 != '' &&
                end4 != '' &&
                nome5 != '' &&
                sexo5 != '' && 
                idade5 != '' &&
                end5 != '' ) {

                document.getElementById('res').innerHTML = `

                            ${nome1}

                        <td class="td">

                        <td class="td">

                    <tr>

                        <td class="td">

                        </td>
                        <td class="td">
                            ${idade3}

                        <td class="td">

                        <td class="td">
