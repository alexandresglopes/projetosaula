<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Paraiso</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="shortcut icon" href="img/logo-hotel-paraiso.png" type="image/x-icon">
</head>

<body>

    <header class="topo">
        <nav class="menu">
            <div class="container nav-menu">
                <div class="divimg"><img src="img/logo-hotel-paraiso.png"></div>

                <input type="checkbox" id="menu-toggle" hidden>

                <label for="menu-toggle" class="menu-icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>

                <ul>
                    <li><a href="" class="active">Home</a></li>
                    <li><a href="lib/quartos.html">Quartos</a></li>
                    <li><a href="lib/hospedes.html">Hóspedes</a></li>
                    <li><a href="lib/localizacao.html">Localização</a></li>
                    <li><a href="lib/galeria.html">Galeria</a></li>
                    <li><a href="lib/reservas.html">Reservas</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <div class="subtopo">
        <h2>Bem-vindo ao Hotel Paraíso</h2>
        <p>
            Conforto, tranquilidade e uma experiência inesquecível.
        </p>
        <a href="lib/reservas.html" class="botao">Faça sua reserva</a>
    </div>

    <main class="conteudo">
        <div class="cards">
            <center>
                <h2 style="margin-bottom: 10px;">Quartos</h2>
            </center>
            <div class="row">
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="img/image5.jpg" onclick="abrirModal(this.src)"
                                class="imgitem"></div>
                        <label class="labelitem">Quarto Luxo</label>
                    </div>
                </div>
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="img/image9.jpg" onclick="abrirModal(this.src)" class="imgitem"></div>
                        <label class="labelitem">Quarto Casal</label>
                    </div>
                </div>
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="img/image2.jpg" onclick="abrirModal(this.src)" class="imgitem"></div>
                        <label class="labelitem">Suíte Master</label>
                    </div>
                </div>
            </div>

            <center>
                <h2 style="margin-bottom: 10px;">Área do Hotel</h2>
            </center>
            <div class="row">
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="img/image1.jpg" onclick="abrirModal(this.src)" class="imgitem"></div>
                        <label class="labelitem">Piscina</label>
                    </div>
                </div>
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="img/image11.png" onclick="abrirModal(this.src)" class="imgitem"></div>
                        <label class="labelitem">Restaurante</label>
                    </div>
                </div>
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="img/image12.jpeg" onclick="abrirModal(this.src)" class="imgitem"></div>
                        <label class="labelitem">Jardim</label>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="meuModal" class="modal" onclick="fecharModal()">
        <span class="fechar">&times;</span>
        <img class="modal-conteudo" id="imgExpandida">
    </div>

    <script>
        function abrirModal(src) {
            const modal = document.getElementById("meuModal");
            const imgModal = document.getElementById("imgExpandida");
            modal.style.display = "flex";
            imgModal.src = src;
        }

        function fecharModal() {
            const modal = document.getElementById("meuModal");
            modal.style.display = "none";
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === "Escape") {
                fecharModal();
            }
        });
    </script>

</body>

</html>
