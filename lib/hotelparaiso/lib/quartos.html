                </div>
                <div class="col-4">

                        </div>
                        <label class="labelitem">Quarto Sol</label><br>
                        <label class="labelitemsuccess">Disponível</label>
                    </div>
                </div>
                <div class="col-6">

                        </div>

                </div>
                <div class="col-6">
                    <div class="item">
                        <div class="foto"><img src="../img/image8.jpg" onclick="abrirModal(this.src)" class="imgitem">
                        </div>
                        <label class="labelitem">Suíte Família</label><br>
                        <label class="labelitemsuccess">Disponível</label>
                    </div>
                </div>
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="../img/image5.jpg" onclick="abrirModal(this.src)" class="imgitem">
                        </div>
                        <label class="labelitem">Quarto Econômico</label><br>
                        <label class="labelitemsuccess">Disponível</label>
                    </div>
                </div>
                <div class="col-4">
                    <div class="item">
                        <div class="foto"><img src="../img/image6.jpg" onclick="abrirModal(this.src)" class="imgitem">
                        </div>
                        <label class="labelitem">Suíte Master</label><br>

                    </div>
                </div>
                <div class="col-4">

                <div class="col-6">

            </div>

        </div>

    </main>

    <div id="meuModal" class="modal" onclick="fecharModal()">
        <span class="fechar">&times;</span>
        <img class="modal-conteudo" id="imgExpandida">
    </div>

    <script>
        function abrirModal(src) {
            const modal = document.getElementById("meuModal");
            const imgModal = document.getElementById("imgExpandida");
            modal.style.display = "flex";
            imgModal.src = src;
        }

        function fecharModal() {
            const modal = document.getElementById("meuModal");
            modal.style.display = "none";
        }

        document.addEventListener('keydown', function (e) {
            if (e.key === "Escape") {
                fecharModal();
            }
        });
    </script>

</body>

</html>
