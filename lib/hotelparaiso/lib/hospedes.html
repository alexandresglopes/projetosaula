<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Paraiso</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="stylesheet" href="../css/bootstrap.css">
    <link rel="shortcut icon" href="../img/logo-hotel-paraiso.png" type="image/x-icon">
    <script src="../js/script.js"></script>
    <script src="../js/viacep.js"></script>
</head>

<body>

    <header class="top-bar">
        <div class="nav-left">
            <a href="../index.html" class="btn-voltar-seta">⬅ Voltar</a>
        </div>
    </header>

    <main class="container-cadastro">
        <div class="card-formulario">
            <div class="divimgform"><img src="../img/logo-hotel-paraiso.png"></div>

            <h2>Cadastro de Hospedes</h2>
            <p>Insira as informações do novo item abaixo:</p>

            <form onsubmit="event.preventDefault(); salvarProduto();">            

                <div class="row">
                    <div class="col-12">
                        <div class="campo-input">
                            <label>Nome completo</label>
                            <input type="text" id="nome" placeholder="..." required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>CPF</label>
                            <input type="text" id="cpf" maxlength="14" oninput="mascaraCPF(this)"
                                placeholder="000.000.000-00" required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>RG</label>
                            <input type="text" id="rg" placeholder="..." required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Tefefone</label>
                            <input type="text" id="telefone" oninput="mascaraCelular(this)"
                                placeholder="(00) 00000-0000" required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>E-mail</label>
                            <input type="email" id="email" placeholder="exemplo@email.com" required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Data Nascimento</label>
                            <input type="date" id="data" placeholder="..." required>
                        </div>
                    </div>
                    <div class="col-12">
                        <hr>
                    </div>
                    <div class="col-12">
                        <h3>Endereço</h3>
                    </div>
                    <div class="col-12">
                        <div class="campo-input">
                            <label>CEP</label>
                            <input type="text" id="cep" maxlength="9" oninput="mascaraCEP(this)" onblur="buscaCEP()"
                                placeholder="00000-000" required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Logradouro</label>
                            <input type="text" id="logradouro" placeholder="..." required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Numero</label>
                            <input type="text" id="numero" placeholder="...">
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Complemento</label>
                            <input type="text" id="complemento" placeholder="...">
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Bairro</label>
                            <input type="text" id="bairro" placeholder="..." required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Cidade</label>
                            <input type="text" id="cidade" placeholder="..." required>
                        </div>
                    </div>                    
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Estado</label>
                            <select id="estado" required>
                                <option value="Rio de Janeiro">Rio de Janeiro</option>
                                <option value="São Paulo">São Paulo</option>
                                <option value="Minas Gerais">Minas Gerais</option>
                                <option value="Espirito Santos">Espirito Santos</option>
                                <option value="Paraná">Paraná</option>
                                <option value="Santa Catarina">Santa Catarina</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>UF</label>
                            <input type="text" id="uf" placeholder="..." required>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="campo-input">
                            <label>Pais</label>
                            <select id="pais" required>
                                <option value="Brasil">Brasil</option>
                                <option value="Estados Unidos">Estados Unidos</option>
                                <option value="França">França</option>
                                <option value="Italia">Italia</option>
                                <option value="Espanha">Espanha</option>
                                <option value="Argentina">Argentina</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12">
                        <hr>
                    </div>
                    <div class="col-12">
                        <h3>Observações</h3>
                    </div>
                    <div class="col-12">
                        <div class="campo-input">
                            <label>Observação</label>
                            <textarea type="text" id="observacao" cols="10" rows="5" placeholder="..."
                                required></textarea>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <button type="button" class="btn-acessar" onclick="limpar()"
                            style="width: 100%; margin-top: 20px;">
                            LIMPAR
                        </button>
                    </div>
                    <div class="col-6">
                        <button type="submit" class="btn-acessar" 
                            style="width: 100%; margin-top: 20px;">
                            CADASTRAR
                        </button>
                    </div>
                </div>


            </form>
        </div>
    </main>

    <script>
        function salvarProduto() {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const cep = document.getElementById('cep').value;
            const logradouro = document.getElementById('logradouro').value;
            const numero = document.getElementById('numero').value;
            const complemento = document.getElementById('complemento').value;
            const bairro = document.getElementById('bairro').value;
            const cidade = document.getElementById('cidade').value;
            const uf = document.getElementById('uf').value;
            const email = document.getElementById('email').value;
            const cpf = document.getElementById('cpf').value;
            const data = document.getElementById('data').value;
            const rg = document.getElementById('rg').value;
            const estado = document.getElementById('estado').value;
            const pais = document.getElementById('pais').value;
            const observacao = document.getElementById('observacao').value;

            let end = logradouro + ', ' + numero + ', ' + complemento + ', ' + bairro + ' - ' + cidade + ' - ' + estado + ' - ' + uf + ' - ' + cep + ' - ' + pais;

            alert(`Hotel Paraiso!\nNome: ${nome}\nCPF: ${cpf}\nRG: ${rg}\nTefefone: ${telefone}\nE-mail: ${email}\nData nasc.: ${data}\nEndereço: ${end}\nObservação: ${observacao}\ncadastrado com sucesso!`);
            document.querySelector('form').reset();
            //window.location.href = '../index.html';
        }

        function limpar() {
            alert('Dados deletados com sucessos.')
            document.querySelector('form').reset();
        }
    </script>

</body>

</html>
