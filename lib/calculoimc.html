<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo IMC</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <script src="../js/script.js"></script>
</head>

<body>

    <div class="divPrincipal">
        <div style="background-color: #4a69bd; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">Calculo IMC</h2>
        </div>
        <div style="padding: 30px;">

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">NOME</label>
                <input type="text" id="nome" placeholder="Digite o nome completo" class="inputnome" required>
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">SEXO</label>
                <select id="sexo" class="select" required>
                    <option value="" disabled selected hidden>--selecione--</option>
                    <option value="1">HOMEM</option>
                    <option value="2">FEMININO</option>
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">PESO:</label>
                <input type="number" id="peso" placeholder="Peso (kg)" class="inputvalor" required>
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">ALTURA:</label>
                <input type="text" id="altura" placeholder="Altura (ex: 1.75)" class="inputvalor" maxlength="4"
                    oninput="mascaraAltura(this)">
            </div>

            <div style="text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="limpar()" class="botaolimpar">
                    LIMPAR
                </button>

                <button onclick="calcularIMC()" class="botao">
                    VERIFICAR
                </button>
            </div>

        </div>
    </div>

    <div id="res"></div>    

    <script>

        function limpar() {

            document.getElementById('nome').value = "";
            document.getElementById('peso').value = "";
            document.getElementById('altura').value = "";
            document.getElementById('res').innerHTML = '';

        }        

        function calcularIMC() {
            let sexo = document.getElementById('sexo').value;
            let nome = document.getElementById('nome').value;
            let p = Number(document.getElementById('peso').value);
            let a = Number(document.getElementById('altura').value);

            if (sexo != '' && nome != '' && p != '' && a != '') {

                nome = nome.toUpperCase();

                let imc = p / (a * a);
                let status = '';
                let i = imc.toFixed(2);
                let s = '';

                switch (sexo) {
                    case '1':
                        s = 'MASCULINO';
                        if (i < 18.5) {
                            status = 'Magreza';
                        } else if (i > 18.5 && i <= 24.9) {
                            status = 'Eutrofia';
                        } else if (i >= 25 && i <= 29.9) {
                            status = 'Pré-obesidade';
                        } else if (i >= 30 && i <= 34.9) {
                            status = 'Obesidade grau I';
                        } else if (i >= 35 && i <= 35.9) {
                            status = 'Obesidade grau II';
                        } else if (i >= 40) {
                            status = 'Obesidade grau III';
                        }
                        break;
                    case '2':
                        s = 'FEMININO';
                        if (i < 18.5) {
                            status = 'Magreza';
                        } else if (i > 18.5 && i <= 24.9) {
                            status = 'Eutrofia';
                        } else if (i >= 25 && i <= 29.9) {
                            status = 'Pré-obesidade';
                        } else if (i >= 30 && i <= 34.9) {
                            status = 'Obesidade grau I';
                        } else if (i >= 35 && i <= 35.9) {
                            status = 'Obesidade grau II';
                        } else if (i >= 40) {
                            status = 'Obesidade grau III';
                        }
                        break;
                    default:
                        alert('sexo não encontrado')
                }

                document.getElementById('res').innerHTML = `
                <div class="divresult">
                    
                    <div style="margin-bottom: 10px;">
                        <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">IMC:</span><br>
                        <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${nome}</span>
                    </div>                    

                    <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                        <div sstyle="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                            <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">Sexo:</span><br>
                            <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${s}</span>
                        </div>

                        <div sstyle="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                            <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">Seu IMC é:</span><br>
                            <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${imc.toFixed(2)}</span>
                        </div>                        
                        
                        <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                            <small style="display: block; color: #999;">Status: </small> <strong>${status}</strong>
                        </div>                        
                    </div> 
                                                                            
                </div>
            `;

            } else {
                alert("PREENCHA OS DADOS!");
            }

        }
    </script>
</body>

</html>
