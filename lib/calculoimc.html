<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo IMC</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body>

    <div class="divPrincipal">
        <div style="background-color: #4a69bd; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">Calculo IMC</h2>
        </div>
        <div style="padding: 30px;">          

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">PESO:</label>
                <input type="number" id="peso" placeholder="Peso (kg)" class="inputvalor">
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">ALTUR:</label>
                <input type="number" id="altura" placeholder="Altura (ex: 1.75)" class="inputvalor">
            </div>

            <div style="text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="limpar()" class="botaolimpar">
                    LIMPAR
                </button>

                <button onclick="calcularIMC()" class="botao">
                    CALCULAR
                </button>
            </div>

        </div>
    </div>

    <div id="res"></div>   

    <script>

         function limpar() {
            
            document.getElementById('peso').value = "";
            document.getElementById('altura').value = "";
            document.getElementById('res').innerHTML = '';

        }
        function calcularIMC() {
            let p = Number(document.getElementById('peso').value);
            let a = Number(document.getElementById('altura').value);
            
            let imc = p / (a * a);
           
            document.getElementById('res').innerHTML = `
                <div class="divresult">                                
                    <div style="margin-bottom: 10px;">
                        <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">Seu IMC é:</span><br>
                        <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${imc.toFixed(2)}</span>
                    </div>                                                        
                </div>
            `;
        }
    </script>
</body>
</html>
