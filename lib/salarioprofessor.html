<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salario Professor</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>

<body>
    <div class="divPrincipal">
        <div style="background-color: #4a69bd; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">Salário do professor</h2>
        </div>
        <div style="padding: 30px;">
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">NOME
                    DO PROFESSOR</label>
                <input type="text" id="nome" placeholder="Digite o nome completo" class="inputnome">
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">CARGA
                    HORÁRIA:</label>
                <input type="number" id="carga" placeholder="0.0" class="inputvalor">
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">VALOR
                    DA HORA (R$):</label>
                <input type="number" id="valor" placeholder="0.0" class="inputvalor">
            </div>

            <div style="text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="limpar()" class="botaolimpar">
                    LIMPAR
                </button>

                <button onclick="verificar()" class="botao">
                    VERIFICAR
                </button>
            </div>
        </div>
    </div>

    <div id="res"></div>

    <script>

        function limpar() {
            document.getElementById('nome').value = "";
            document.getElementById('carga').value = "";
            document.getElementById('valor').value = "";            
            document.getElementById('res').innerHTML = '';

        }


        function formatarReal(valor) {

            let numero = parseFloat(valor);

            if (isNaN(numero)) return "0,00";

            return numero.toLocaleString('pt-BR', {
                minimumFractionDigits: 2,                
            });
        }

        function verificar() {
            let nome = document.getElementById('nome').value;
            let carga = Number(document.getElementById('carga').value);
            let valor = Number(document.getElementById('valor').value);
            nome = nome.toUpperCase();

            let soma = valor * carga;

            soma = formatarReal(soma);
            valor = formatarReal(valor);

            document.getElementById('res').innerHTML = `
                <div class="divresult">                    
                    <div style="margin-bottom: 10px;">
                        <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">Relatório Salário:</span><br>
                        <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${nome}</span>
                    </div>

                    <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                        <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                            <small style="display: block; color: #999;">Carga hr: </small> <strong>${carga}</strong>
                        </div> 
                        
                        <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                            <small style="display: block; color: #999;">Valor hr R$</small> <strong>${valor}</strong>
                        </div>

                        <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                            <small style="display: block; color: #999;">Valor R$</small> <strong>${soma}</strong>
                        </div>
                    </div>                                        
                </div>
            `;

        }
    </script>
</body>

</html>
