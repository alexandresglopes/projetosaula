<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <script src="../js/script.js"></script>
    <script src="../js/session.js"></script>
</head>

<body>

    <header class="top-bar">
        <div class="nav-left">
            <a href="home.html" class="btn-voltar-seta">⬅ Voltar</a>
        </div>
        <div class="user-info">
            Setor: <span id="user"><b>GESTOR</b></span>
        </div>
    </header>

    <main class="container-cadastro">
        <div class="card-formulario">
            <div class="logo-apresentacao">
                Ponte<span>Dourada</span>
            </div>

            <h2>Cadastro de Serviço</h2>
            <p>Insira as informações do novo item abaixo:</p>

            <form onsubmit="event.preventDefault(); salvarProduto();">
                <div class="campo-input">
                    <label>Nome do Serviço</label>
                    <input type="text" id="nomeServico" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>Descrição do Serviço</label>
                    <textarea type="text" id="descricao" cols="10" rows="5" placeholder="..." required></textarea>
                </div>

                <div class="campo-input">
                    <label>Preço Base</label>
                    <input type="text" id="PrecoBase" oninput="mascaraMoeda(this);" step="0.01" placeholder="0,00"
                        required>
                </div>

                <button type="submit" class="btn-acessar" style="width: 100%; margin-top: 20px;">
                    CADASTRAR SERVIÇO
                </button>
            </form>
        </div>
    </main>

    <script>
        function salvarProduto() {
            const nome = document.getElementById('nomeServico').value;
            const descricao = document.getElementById('descricao').value;
            const preco = document.getElementById('PrecoBase').value;
            alert(`Serviço: ${nome}\nDescrição: ${descricao}\nPreço: ${preco}\ncadastrado com sucesso!`);
            document.querySelector('form').reset();
            window.location.href = 'home.html';
        }        
    </script>

</body>

</html>
