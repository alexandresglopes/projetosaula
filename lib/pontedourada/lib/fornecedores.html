<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <script src="../js/script.js"></script>
    <script src="../js/viacep.js"></script>
    <script src="../js/session.js"></script>
</head>

<body>

    <header class="top-bar">
        <div class="nav-left">
            <a href="home.html" class="btn-voltar-seta">⬅ Voltar</a>
        </div>
        <div class="user-info">
            Setor: <span id="user"><b>GESTOR</b></span>
        </div>
    </header>

    <main class="container-cadastro">
        <div class="card-formulario">
            <div class="logo-apresentacao">
                Ponte<span>Dourada</span>
            </div>

            <h2>Cadastro de Fornecedores</h2>
            <p>Insira as informações do novo item abaixo:</p>

            <form onsubmit="event.preventDefault(); salvarProduto();">
                <div class="campo-input">
                    <label>Nome</label>
                    <input type="text" id="nome" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>Tefefone</label>
                    <input type="text" id="telefone" oninput="mascaraCelular(this)" placeholder="(00) 00000-0000"
                        required>
                </div>

                <div class="campo-input">
                    <label>CEP</label>
                    <input type="text" id="cep" maxlength="9" oninput="mascaraCEP(this)" onblur="buscaCEP()"
                        placeholder="00000-000" required>
                </div>

                <div class="campo-input">
                    <label>Logradouro</label>
                    <input type="text" id="logradouro" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>Numero</label>
                    <input type="text" id="numero" placeholder="...">
                </div>

                <div class="campo-input">
                    <label>Complemento</label>
                    <input type="text" id="complemento" placeholder="...">
                </div>

                <div class="campo-input">
                    <label>Bairro</label>
                    <input type="text" id="bairro" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>Cidade</label>
                    <input type="text" id="cidade" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>UF</label>
                    <input type="text" id="uf" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>Razão Social</label>
                    <input type="text" id="razaoSocial" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>CNPJ</label>
                    <input type="text" id="cnpj" maxlength="18" oninput="mascaraCNPJ(this)"
                        placeholder="00.000.000/0000-00" required>
                </div>

                <button type="submit" class="btn-acessar" style="width: 100%; margin-top: 20px;">
                    CADASTRAR FORNECEDOR
                </button>
            </form>
        </div>
    </main>

    <script>
        function salvarProduto() {
            const nome = document.getElementById('nome').value;
            const telefone = document.getElementById('telefone').value;
            const cep = document.getElementById('cep').value;
            const logradouro = document.getElementById('logradouro').value;
            const numero = document.getElementById('numero').value;
            const complemento = document.getElementById('complemento').value;
            const bairro = document.getElementById('bairro').value;
            const cidade = document.getElementById('cidade').value;
            const uf = document.getElementById('uf').value;
            const razaosocial = document.getElementById('razaoSocial').value;
            const cnpj = document.getElementById('cnpj').value;

            let end = logradouro + ', ' + numero + ', ' + complemento + ', ' + bairro + ' - ' + cidade + ' - ' + uf + ' - ' + cep;

            alert(`Nome: ${nome}\nTefefone: ${telefone}\nEndereço: ${end}\nRazão Social: ${nome}\nCNPJ: ${cnpj}\ncadastrado com sucesso!`);
            document.querySelector('form').reset();
            window.location.href = 'home.html';
        }        
    </script>

</body>

</html>
