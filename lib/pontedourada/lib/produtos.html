<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
</head>

<body>

    <header class="top-bar">
        <div class="nav-left">
            <a href="home.html" class="btn-voltar-seta">⬅ Voltar</a>
        </div>
        <div class="user-info">
            Setor: <span><b>GESTOR</b></span>
        </div>
    </header>

    <main class="container-cadastro">
        <div class="card-formulario">
            <div class="logo-apresentacao">
                Ponte<span>Dourada</span>
            </div>

            <h2>Cadastro de Produto</h2>
            <p>Insira as informações do novo item abaixo:</p>

            <form onsubmit="event.preventDefault(); salvarProduto();">
                <div class="campo-input">
                    <label>Nome do Produto</label>
                    <input type="text" id="nomeProduto" placeholder="Ex: Cama Hospitalar Articulada" required>
                </div>

                <div class="campo-input">
                    <label>Tipo Produto</label>
                    <div class="custom-select-wrapper">
                        <div class="select-trigger">-- Selecione --</div>
                        <div class="custom-options">
                            <div class="custom-option" data-value="Equipamento">Equipamento</div>
                            <div class="custom-option" data-value="Insumo">Insumo</div>
                            <div class="custom-option" data-value="Descartavel">Descartavel</div>
                        </div>
                        <input type="hidden" id="tipoProduto" name="tipoProduto">
                    </div>
                </div>

                <div class="campo-input">
                    <label>Fornecedor</label>
                    <input type="text" id="fornecedor" placeholder="Digite o nome do fornecedor" required>
                </div>

                <button type="submit" class="btn-acessar" style="width: 100%; margin-top: 20px;">
                    CADASTRAR PRODUTO
                </button>
            </form>
        </div>
    </main>

    <script>
        function salvarProduto() {
            const nome = document.getElementById('nomeProduto').value;
            const tipo = document.getElementById('tipoProduto').value;
            const fornecedor = document.getElementById('fornecedor').value;
            alert(`Produto: ${nome}\nTipo: ${tipo}\nFornecedor: ${fornecedor}\ncadastrado com sucesso!`);
            document.querySelector('form').reset();
            window.location.href = 'home.html';
        }



        document.querySelector('.select-trigger').addEventListener('click', function (e) {
            e.stopPropagation();
            this.parentElement.classList.toggle('open');
        });

        document.querySelectorAll('.custom-option').forEach(option => {
            option.addEventListener('click', function () {
                const value = this.getAttribute('data-value');
                const trigger = this.closest('.custom-select-wrapper').querySelector('.select-trigger');
                const hiddenInput = document.getElementById('tipoProduto');

                trigger.textContent = this.textContent;
                hiddenInput.value = value;
                this.closest('.custom-select-wrapper').classList.remove('open');
            });
        });


        window.addEventListener('click', function (e) {
            const wrapper = document.querySelector('.custom-select-wrapper');

            if (!wrapper.contains(e.target)) {
                wrapper.classList.remove('open');
            }
        });
    </script>

</body>

</html>
