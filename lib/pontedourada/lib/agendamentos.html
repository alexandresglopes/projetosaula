<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponte Dourada</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
</head>

<body>

    <header class="top-bar">
        <div class="nav-left">
            <a href="home.html" class="btn-voltar-seta">⬅ Voltar</a>
        </div>
        <div class="user-info">
            Setor: <span><b>GESTOR</b></span>
        </div>
    </header>

    <main class="container-cadastro">
        <div class="card-formulario">
            <div class="logo-apresentacao">
                Ponte<span>Dourada</span>
            </div>

            <h2>Cadastro de Agendamentos</h2>
            <p>Insira as informações do novo item abaixo:</p>

            <form onsubmit="event.preventDefault(); salvarProduto();">

                <div class="campo-input">
                    <label>Nome do Cliente</label>
                    <div class="custom-select-wrapper">
                        <div class="select-trigger">-- Selecione --</div>
                        <div class="custom-options">
                            <div class="custom-option" data-value="Maria">Maria</div>
                            <div class="custom-option" data-value="João">João</div>
                            <div class="custom-option" data-value="Pedro">Pedro</div>
                        </div>
                        <input type="hidden" id="nomeCliente" name="nomeCliente">
                    </div>
                </div>

                <div class="campo-input">
                    <label>Nome do Profissional</label>
                    <div class="custom-select-wrapper">
                        <div class="select-trigger">-- Selecione --</div>
                        <div class="custom-options">
                            <div class="custom-option" data-value="Alberto">Alberto</div>
                            <div class="custom-option" data-value="Marcos">Marcos</div>
                            <div class="custom-option" data-value="Gustavo">Gustavo</div>
                        </div>
                        <input type="hidden" id="nomeProfissional" name="nomeProfissional">
                    </div>
                </div>

                <div class="campo-input">
                    <label>Nome do Serviço</label>
                    <input type="text" id="nomeServico" placeholder="..." required>
                </div>

                <div class="campo-input">
                    <label>Data Agenda</label>
                    <input type="date" id="dataAgenda" required>
                </div>

                <div class="campo-input">
                    <label>Status</label>
                    <div class="custom-select-wrapper">
                        <div class="select-trigger">-- Selecione --</div>
                        <div class="custom-options">
                            <div class="custom-option" data-value="Ativo">Ativo</div>
                            <div class="custom-option" data-value="Desativado">Desativado</div>
                        </div>
                        <input type="hidden" id="status" name="status">
                    </div>
                </div>

                <div class="campo-input">
                    <label>Observações</label>
                    <textarea type="text" id="observacao" cols="10" rows="5" placeholder="..." required></textarea>
                </div>

                <button type="submit" class="btn-acessar" style="width: 100%; margin-top: 20px;">
                    CADASTRAR AGENDA
                </button>
            </form>
        </div>
    </main>

    <script>
        function salvarProduto() {
            const nomecliente = document.getElementById('nomeCliente').value;
            const nomeprofissional = document.getElementById('nomeProfissional').value;
            const nomeservico = document.getElementById('nomeServico').value;
            const dataagenda = document.getElementById('dataAgenda').value;
            const status = document.getElementById('status').value;
            const observacao = document.getElementById('observacao').value;
            alert(`Nome do Cliente: ${nomecliente}\nNome do Profissional: ${nomeprofissional}\nServiço: ${nomeservico}\nData: ${dataagenda}\nStatus: ${status}\nObservação: ${observacao}\ncadastrado com sucesso!`);
            document.querySelector('form').reset();
            window.location.href = 'home.html';
        }




        document.querySelectorAll('.select-trigger').forEach(trigger => {
            trigger.addEventListener('click', function (e) {
                e.stopPropagation();

                document.querySelectorAll('.custom-select-wrapper').forEach(w => {
                    if (w !== this.parentElement) w.classList.remove('open');
                });

                this.parentElement.classList.toggle('open');
            });
        });



        document.querySelectorAll('[class^="custom-option"]').forEach(option => {
            option.addEventListener('click', function (e) {

                e.stopPropagation();

                const valorTecnico = this.getAttribute('data-value');

                const textoVisivel = this.innerText.trim();

                const wrapper = this.closest('.custom-select-wrapper');
                const trigger = wrapper.querySelector('.select-trigger');
                const hiddenInput = wrapper.querySelector('input[type="hidden"]');

                trigger.innerText = textoVisivel;
                hiddenInput.value = valorTecnico;

                wrapper.classList.remove('open');

                console.log("Selecionado:", valorTecnico);
            });
        });


        window.addEventListener('click', function (e) {
            document.querySelectorAll('.custom-select-wrapper').forEach(wrapper => {
                if (!wrapper.contains(e.target)) {
                    wrapper.classList.remove('open');
                }
            });
        });
    </script>

</body>

</html>
