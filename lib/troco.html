<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troco</title>
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <link rel="stylesheet" href="../css/estilo.css">
    <script src="../js/script.js"></script>
</head>

<body>
    <div class="divPrincipal">
        <div style="background-color: #4a69bd; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 20px; letter-spacing: 1px;">Caixa Registradora</h2>
        </div>
        <div style="padding: 30px;">

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">PRODUTO</label>
                <input type="text" id="nome" placeholder="Digite o nome completo" class="inputnome">
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">VALOR
                    (R$):</label>
                <input type="text" id="valor" oninput="mascaraMoeda(this)" placeholder="0.0" class="inputvalor">
            </div>

            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: bold; color: #555; font-size: 14px;">RECEBIDO
                    (R$):</label>
                <input type="text" id="recebido" oninput="mascaraMoeda(this)" placeholder="0.0" class="inputvalor">
            </div>

            <div style="text-align: right; border-top: 1px solid #eee; padding-top: 20px;">
                <button onclick="limpar()" class="botaolimpar">
                    LIMPAR
                </button>

                <button onclick="verificar()" class="botao">
                    VERIFICAR
                </button>
            </div>

        </div>
    </div>

    <div id="res"></div>

    <script>

        function limpar() {

            document.getElementById('nome').value = "";
            document.getElementById('recebido').value = "";
            document.getElementById('valor').value = "";
            document.getElementById('res').innerHTML = '';

        }

        function verificar() {
            let nome = document.getElementById('nome').value;
            let valorCampo = document.getElementById('valor').value;
            let valorCampo2 = document.getElementById('recebido').value;

            if (nome != '' && valorCampo != '' && valorCampo2 != '') {

                nome = nome.toUpperCase();
                let valor = Number(valorCampo.replace(/\./g, "").replace(",", "."));
                let recebido = Number(valorCampo2.replace(/\./g, "").replace(",", "."));

                if (valor <= recebido) {
                    let soma = recebido - valor;

                    soma = formatarReal(soma);
                    valor = formatarReal(valor);

                    document.getElementById('res').innerHTML = `
                        <div class="divresult">                    
                            <div style="margin-bottom: 10px;">
                                <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">PRODUTO:</span><br>
                                <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${nome}</span>
                            </div>

                            <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;"> 
                                <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                    <small style="display: block; color: #999;">Valor Produto R$</small> <strong>${valor}</strong>
                                </div>
                            </div>

                            <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;"> 
                                <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                    <small style="display: block; color: #999;">Valor Recebido R$</small> <strong>${recebido}</strong>
                                </div>
                            </div>

                            <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;"> 
                                <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                    <small style="display: block; color: #999;">Troco R$</small> <strong>${soma}</strong>
                                </div>
                            </div>                                        
                        </div>
                    `;
                } else {

                    let soma = valor - recebido;

                    soma = formatarReal(soma);
                    valor = formatarReal(valor);

                    document.getElementById('res').innerHTML = `
                        <div class="divresult">                    
                            <div style="margin-bottom: 10px;">
                                <span style="color: #777; font-size: 12px; font-weight: bold; text-transform: uppercase;">PRODUTO:</span><br>
                                <span style="font-size: 22px; font-weight: bold; color: #2c3e50;">${nome}</span>
                            </div>

                            <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                                <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                    <small style="display: block; color: #999;">Valor Produto: R$</small> <strong>${valor}</strong>
                                </div> 
                                
                                <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                    <small style="display: block; color: #999;">Valor Recebido: R$</small> <strong>${recebido}</strong>
                                </div>

                                <div style="background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; min-width: 80px; text-align: center;">
                                    <small style="display: block; color: #999;">Valor faltante: R$</small> <strong>${soma}</strong>
                                </div>
                                
                            </div>                                        
                        </div>
                        
                    `;

                }

            } else {
                alert("PREENCHA OS DADOS!");
            }



        }
    </script>
</body>

</html>
